<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>张哲的爱情测试 - 部署版</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #ffe4e4 0%, #e8f0ff 100%);
      font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
      padding: 20px;
    }
    .card {
      background: #fff;
      border-radius: 24px;
      padding: 2.5rem 1.8rem 2rem;
      width: 100%;
      max-width: 400px;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.10);
    }
    .icon { font-size: 56px; margin-bottom: 16px; line-height: 1; }
    h1 { font-size: 22px; font-weight: 700; color: #1a1a1a; margin-bottom: 6px; }
    .sub { font-size: 14px; color: #999; margin-bottom: 28px; }
    .question { font-size: 17px; font-weight: 600; color: #333; margin-bottom: 18px; line-height: 1.5; }
    .quick-btns { display: flex; gap: 10px; margin-bottom: 14px; }
    .quick-btn {
      flex: 1; padding: 13px 0; border-radius: 12px;
      font-size: 15px; font-weight: 600; border: none; cursor: pointer;
      transition: transform 0.1s; color: #fff;
    }
    .quick-btn:active { transform: scale(0.96); }
    .btn-yes { background: #e05c5c; }
    .btn-no  { background: #5c89e0; }
    .divider { font-size: 12px; color: #ccc; margin-bottom: 14px; }
    .input-row { display: flex; gap: 8px; margin-bottom: 6px; }
    input[type="text"] {
      flex: 1; padding: 12px 14px; border: 1.5px solid #e8e8e8;
      border-radius: 10px; font-size: 15px; outline: none; color: #333;
      transition: border-color 0.2s; -webkit-appearance: none;
    }
    input[type="text"]:focus { border-color: #aaa; }
    .confirm-btn {
      padding: 12px 18px; background: #333; color: #fff;
      border: none; border-radius: 10px; font-size: 15px;
      cursor: pointer; white-space: nowrap; -webkit-appearance: none;
    }
    .confirm-btn:active { background: #555; }
    .hint { font-size: 12px; color: #ccc; margin-bottom: 4px; }
    .result {
      margin-top: 22px; padding: 20px 16px; border-radius: 16px;
      display: none; animation: pop 0.35s cubic-bezier(.34,1.56,.64,1);
    }
    .result-yes { background: #fff0f0; }
    .result-no  { background: #eef4ff; }
    .result-emoji { font-size: 40px; margin-bottom: 8px; }
    .result-text  { font-size: 22px; font-weight: 700; }
    .result-yes .result-text { color: #c0392b; }
    .result-no  .result-text { color: #2563eb; }
    .result-sub { font-size: 13px; color: #aaa; margin-top: 6px; }
    @keyframes pop {
      0% { transform: scale(0.7) translateY(10px); opacity: 0; }
      100% { transform: scale(1) translateY(0); opacity: 1; }
    }
    .reset-btn {
      margin-top: 18px; display: none; width: 100%; padding: 12px 0;
      background: transparent; color: #aaa; border: 1.5px solid #eee;
      border-radius: 10px; font-size: 14px; cursor: pointer;
    }
    .reset-btn:active { background: #f5f5f5; }

    /* 分享区 */
    .share-section {
      margin-top: 24px; padding-top: 20px;
      border-top: 1px solid #f0f0f0;
    }
    .share-title { font-size: 13px; color: #999; margin-bottom: 12px; }
    .share-url {
      background: #f8f8f8; border-radius: 10px; padding: 10px 14px;
      font-size: 11px; color: #777; word-break: break-all;
      margin-bottom: 12px; font-family: monospace;
    }
    .copy-btn {
      width: 100%; padding: 10px 0; border: 1.5px solid #ddd;
      border-radius: 10px; background: #fff; font-size: 14px;
      color: #555; cursor: pointer; transition: all 0.2s;
    }
    .copy-btn:active { background: #f0f0f0; }
    .copy-ok { color: #1D9E75 !important; border-color: #1D9E75 !important; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🎮</div>
    <h1>张哲的爱情测试</h1>
    <p class="sub">来测测你们之间的缘分吧</p>
    <p class="question">你喜不喜欢玩暗区突围？</p>

    <div class="quick-btns">
      <button class="quick-btn btn-yes" onclick="answer('喜欢')">喜欢 👍</button>
      <button class="quick-btn btn-no"  onclick="answer('不喜欢')">不喜欢 👎</button>
    </div>
    <p class="divider">— 或者自己输入 —</p>
    <div class="input-row">
      <input id="ans" type="text" placeholder="输入你的回答…"
             onkeydown="if(event.key==='Enter') answer(this.value)">
      <button class="confirm-btn" onclick="answer(document.getElementById('ans').value)">确认</button>
    </div>
    <p class="hint">直接点按钮，或自由输入</p>
    <div id="result" class="result">
      <div class="result-emoji" id="resEmoji"></div>
      <div class="result-text"  id="resText"></div>
      <div class="result-sub"   id="resSub"></div>
    </div>
    <button id="resetBtn" class="reset-btn" onclick="resetAll()">再来一次 ↩</button>

    <!-- 分享给朋友 -->
    <div class="share-section">
      <p class="share-title">📤 把本页发给朋友一起玩</p>
      <div class="share-url" id="shareUrl">加载中...</div>
      <button class="copy-btn" id="copyBtn" onclick="copyLink()">复制链接</button>
    </div>
  </div>

  <script>
    // 自动检测当前 URL 用于分享
    var currentUrl = window.location.href;
    document.getElementById('shareUrl').textContent = currentUrl;
    if (currentUrl.startsWith('file://')) {
      document.getElementById('shareUrl').textContent = '请将此文件发给朋友，用浏览器打开即可';
    }

    function answer(val) {
      var x = (val || '').trim();
      if (!x) return;
      document.getElementById('ans').value = x;
      var box      = document.getElementById('result');
      var emoji    = document.getElementById('resEmoji');
      var text     = document.getElementById('resText');
      var sub      = document.getElementById('resSub');
      var resetBtn = document.getElementById('resetBtn');
      box.style.display = 'none';
      void box.offsetWidth;
      if (x === '喜欢') {
        box.className = 'result result-yes';
        emoji.textContent = '❤️';
        text.textContent  = '张哲爱你！';
        sub.textContent   = '两个人都喜欢暗区突围，缘分天注定~';
      } else {
        box.className = 'result result-no';
        emoji.textContent = '💙';
        text.textContent  = '张哲不爱你';
        sub.textContent   = '不玩游戏也没关系，爱情不止一种方式';
      }
      box.style.display = 'block';
      resetBtn.style.display = 'block';
      box.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
    function resetAll() {
      document.getElementById('ans').value = '';
      document.getElementById('result').style.display = 'none';
      document.getElementById('resetBtn').style.display = 'none';
    }
    function copyLink() {
      var url = window.location.href;
      if (url.startsWith('file://')) {
        alert('当前是本地文件，请先把文件发给朋友！\n\n方法：微信/QQ 发送文件，或上传到网盘分享');
        return;
      }
      if (navigator.clipboard) {
        navigator.clipboard.writeText(url).then(function() {
          var btn = document.getElementById('copyBtn');
          btn.textContent = '已复制！✅';
          btn.classList.add('copy-ok');
          setTimeout(function() {
            btn.textContent = '复制链接';
            btn.classList.remove('copy-ok');
          }, 2000);
        });
      }
    }
  </script>
</body>
</html>
